# Append this to events/nginx/default.conf on the EC2 host (after the existing
# events.tixpass.co.kr blocks).
#
# Procedure:
#   1. Add only the HTTP (port 80) block first.
#   2. docker exec nginx nginx -s reload
#   3. docker exec certbot certbot certonly --webroot -w /var/www/certbot -d team.tixpass.co.kr
#   4. Add the HTTPS (port 443) block.
#   5. docker exec nginx nginx -s reload

server {
    listen 80;
    server_name team.tixpass.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name team.tixpass.co.kr;

    ssl_certificate /etc/letsencrypt/live/team.tixpass.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/team.tixpass.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Streaming SSE + large prompt support
    proxy_read_timeout 15m;
    proxy_send_timeout 15m;
    proxy_buffering off;
    client_max_body_size 60m;

    resolver 127.0.0.11 valid=10s;

    location / {
        set $upstream_haera http://haera-web:3000;
        proxy_pass $upstream_haera;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
