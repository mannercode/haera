services:
  web:
    # Pull from ECR (set WEB_IMAGE in .env). Example:
    #   851563870556.dkr.ecr.ap-northeast-2.amazonaws.com/tixpass:team
    image: ${WEB_IMAGE}
    container_name: haera-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-haera}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://haera-minio:9000}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET:-haera}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      SESSION_SECRET: ${SESSION_SECRET}
      SIGNUP_CODE: ${SIGNUP_CODE:-0000}
      HAERA_INTERNAL_TOKEN: ${HAERA_INTERNAL_TOKEN}
      NODE_ENV: production
    volumes:
      - ./var:/var/haera
    networks:
      - shared
      - default
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: haera-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - ./var/minio:/data
    networks:
      - default

networks:
  # Shared with the existing nginx/certbot stack so the reverse proxy can
  # reach haera-web by container name.
  shared:
    external: true
    name: events_default
  default:
    name: haera_default
