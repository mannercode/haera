services:
  web:
    # Pull from ECR (set WEB_IMAGE in .env). Example:
    #   851563870556.dkr.ecr.ap-northeast-2.amazonaws.com/tixpass:team
    image: ${WEB_IMAGE}
    container_name: haera-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-haera}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # AWS S3 in production. Endpoint blank → SDK uses default AWS endpoint.
      # Credentials blank → SDK uses EC2 instance profile (IAM role).
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      SESSION_SECRET: ${SESSION_SECRET}
      SIGNUP_CODE: ${SIGNUP_CODE:-0000}
      HAERA_INTERNAL_TOKEN: ${HAERA_INTERNAL_TOKEN}
      NODE_ENV: production
    volumes:
      - ./var:/var/haera
    networks:
      - shared
    labels:
      # Watchtower polls ECR and auto-pulls/restarts when a new image is published.
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: haera-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # ECR credential helper config (created once on the host via ec2-bootstrap).
      - /home/ec2-user/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"     # only watch containers with the enable label
      WATCHTOWER_CLEANUP: "true"          # remove old images after update
      WATCHTOWER_POLL_INTERVAL: "120"     # 2 min — fast enough for personal use
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_NOTIFICATION_REPORT: "true"

networks:
  # Shared with the existing nginx/certbot stack so the reverse proxy can
  # reach haera-web by container name.
  shared:
    external: true
    name: events_default
