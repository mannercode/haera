services:
  caddy:
    image: caddy:2-alpine
    container_name: haera-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./var/caddy/data:/data
      - ./var/caddy/config:/config
    depends_on:
      - web

  web:
    # WEB_IMAGE example: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/tixpass:team
    image: ${WEB_IMAGE}
    container_name: haera-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-haera}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET:-haera}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      SESSION_SECRET: ${SESSION_SECRET}
      SIGNUP_CODE: ${SIGNUP_CODE:-0000}
      HAERA_INTERNAL_TOKEN: ${HAERA_INTERNAL_TOKEN}
      NODE_ENV: production
    volumes:
      - ./var:/var/haera
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: haera-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # Not exposed to host — only reachable by web container via docker network.
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - ./var/minio:/data
